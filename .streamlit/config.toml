[server]
# Stop the hot-reload watcher from crawling transformers' submodules
# (it tries to import optional torchvision vision models -> noisy tracebacks).
fileWatcherType = "none"
headless = true

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#ff6b6b"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161e2e"
textColor = "#e6ebf5"
